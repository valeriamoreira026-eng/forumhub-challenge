# =============================================
# CONFIGURA«’ES DO BANCO DE DADOS - EXEMPLO
# =============================================
# Copie este arquivo para application.properties
# e preencha com seus dados

# Banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/forum_hub_db
spring.datasource.username=root
spring.datasource.password=SUA_SENHA_AQUI

# ConfiguraÁıes JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Executar schema.sql automaticamente na primeira vez
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql