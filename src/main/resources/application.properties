# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE - MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/forum_hub_db
spring.datasource.username=root
spring.datasource.password=ForumHub@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# REMOVA ESTA LINHA (ou comente):
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# LOGGING (opcional para desenvolvimento)
# ===============================
logging.level.org.springframework=INFO
logging.level.com.forumhub=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# JWT
# ===============================
api.security.token.secret=12345678